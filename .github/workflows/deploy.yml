name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Astro + Pagefind)
        run: npm run build

      - name: Verify critical outputs
        run: |
          set -e
          for f in dist/index.html dist/feed.xml dist/feed.json dist/sitemap-index.xml \
                   dist/robots.txt dist/ads.txt dist/404.html dist/CNAME; do
            test -s "$f" || { echo "::error::missing build artifact $f"; exit 1; }
          done
          # /docs passthrough must survive the build (handled separately, never clobbered).
          test -d dist/docs && [ "$(ls -A dist/docs)" ] || { echo "::error::/docs missing"; exit 1; }
          echo "All critical artifacts present."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
